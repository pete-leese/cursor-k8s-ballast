# ArgoCD Application for orders. Multi-source: the chart is rendered from
# charts/ballast-service with the per-service values file pulled from the same
# repo via the $values ref. The "bad chart bump" is a git edit to that values
# file (scripts/break.sh), which ArgoCD then syncs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orders
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: k8s-ballast
  destination:
    server: https://kubernetes.default.svc
    namespace: ballast
  sources:
    - repoURL: https://github.com/pete-leese/cursor-k8s-ballast
      targetRevision: main
      ref: values
    - repoURL: https://github.com/pete-leese/cursor-k8s-ballast
      targetRevision: main
      path: charts/ballast-service
      helm:
        releaseName: orders
        valueFiles:
          - $values/deploy/services/orders.values.yaml
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
