# App-of-apps: the single Application you bootstrap. It syncs every child
# Application under deploy/argocd/apps/, which in turn deploy the services. This
# is the GitOps entrypoint — after this is applied, ArgoCD owns the cluster state
# and reconciles it against git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ballast-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pete-leese/cursor-k8s-ballast
    targetRevision: incident/break/payments-20260709-223905
    path: deploy/argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
