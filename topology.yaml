# Declared service dependency graph for the k8s-ballast prototype.
#
# Media-streaming fleet: ingest is the memory-heavy upstream (chunk buffers).
# A bad chart bump OOMs ingest → CrashLoopBackOff; dependents feel the blast
# radius. Prefer a targeted forward-fix of ingest's memory limit over rolling
# back the whole pipeline.
#
# In production this same shape would come from a service-mesh / Consul MCP
# TopologySource; the prototype reads this file instead.

services:
  ingest:
    depends_on: []            # upstream — the incident target
  transcode:
    depends_on: [ingest]
  playback:
    depends_on: [ingest, transcode]
  recommendations:
    depends_on: [playback]
  catalog:
    depends_on: [ingest]
