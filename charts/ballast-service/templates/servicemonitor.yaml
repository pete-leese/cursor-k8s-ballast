{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "ballast-service.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ballast-service.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "ballast-service.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
