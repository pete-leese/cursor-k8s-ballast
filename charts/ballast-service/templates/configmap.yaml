apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ballast-service.name" . }}-app
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ballast-service.labels" . | nindent 4 }}
data:
  # Loaded from files/app.py verbatim (not re-parsed as a template), so the
  # Python f-strings that emit Prometheus `{...}` label sets are left intact.
  app.py: |
{{ .Files.Get "files/app.py" | indent 4 }}
